name: xibalba-client

services:
  explorer:
    build:
      context: .
      dockerfile: client.dockerfile
    # Run Explorer on 5173
    command: [
      "bun",
      "run",
      "--cwd",
      "apps/explorer",
      "vite",
      "dev",
      "--host",
      "0.0.0.0",
      "--port",
      "5173",
    ]
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      # Prevent your host machine's node_modules from overwriting the container's Linux bindings
      - /app/node_modules

  vision:
    build:
      context: .
      dockerfile: client.dockerfile
    # Run Vision on 5174
    command: [
      "bun",
      "run",
      "--cwd",
      "apps/vision",
      "vite",
      "dev",
      "--host",
      "0.0.0.0",
      "--port",
      "5174",
    ]
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - /app/node_modules
